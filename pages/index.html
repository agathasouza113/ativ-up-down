<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="shortcut icon" href="https://cdn.pixabay.com/photo/2016/12/18/13/45/download-1915753_1280.png" type="image/x-icon">
    <title>Sistema de Envio de Currículo</title>
</head>
<body>
    <h1>Sistema de Envio de Currículo</h1>
    <div class="container">
        <p>Nome:</p>
        <input type="text" id="nome">
        <p>Email:</p>
        <input type="email" id="email" placeholder="seuemail@dominio.com">
        <p>Telefone:</p>
        <input type="tel" id="telefone" placeholder="12345678910">
        <input type="file" id="arquivo" accept="pdf., docs., docx.">

        <button onclick="enviarCurriculo()">Enviar Currículo</button>
    </div>
    <div class="information-container">
        <p id="information"></p>
        <a href="../files/comprovante.pdf" id="download" style="display:none;">Baixar comprovante</a>
        </div>
    <script src="../scripts/script.js"></script>
</body>
</html>
