<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="shortcut icon" href="https://cdn.pixabay.com/photo/2016/12/18/13/45/download-1915753_1280.png" type="image/x-icon">
    <title>Sistema de Envio de Currículo</title>
</head>
<body>
    <div class="container">
        <h1>Sistema de Envio de Currículo</h1>
        <p>Nome:</p>
        <input type="text" id="nome">
        <p>Email:</p>
        <input type="email" id="email">
        <p>Telefone:</p>
        <input type="tel" id="telefone">
        <input type="file" id="arquivo" accept="pdf., docs., docx.">

        <button onclick="enviarCurriculo()">Enviar Currículo</button>

        <p id="information"></p>
        <a href="../files/comprovante.pdf" id="download" style="display:none;">Baixar comprovante</a>
    </div>
    <script src="../scripts/script.js"></script>
</body>
</html>
